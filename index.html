<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>추첨 프로그램</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background-color: #f0f0f0;
    }
    h1 {
      margin-bottom: 10px;
    }
    .input-container {
      display: grid;
      grid-template-columns: repeat(2, auto);
      gap: 5px 15px;
      margin-bottom: 20px;
    }
    .input-container input {
      padding: 5px;
      font-size: 14px;
      width: 200px;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      margin: 5px;
    }
    #result {
      margin-top: 30px;
      font-size: 24px;
      font-weight: bold;
      color: #2c3e50;
      min-height: 40px;
    }

    /* 당첨자 텍스트 튀어나오기 애니메이션 */
    @keyframes winnerAppear {
      0% {
        transform: scale(0) rotate(-10deg);
        opacity: 0;
      }
      50% {
        transform: scale(1.3) rotate(5deg);
      }
      100% {
        transform: scale(1) rotate(0deg);
        opacity: 1;
      }
    }

    /* 반짝이는 효과 */
    @keyframes glow {
      0%, 100% {
        text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 15px #ffd700, 0 0 20px #ffd700;
      }
      50% {
        text-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 30px #ffd700, 0 0 40px #ffd700;
      }
    }

    /* 당첨자 발표 시 적용될 클래스 */
    .winner-animation {
      animation: winnerAppear 0.6s ease-out, glow 1.5s ease-in-out infinite;
      font-size: 36px !important;
      color: #ff6b6b;
    }

    /* ===================================== */
    /* 드럼롤 관련 스타일 (긴장감 높이기)   */
    /* ===================================== */

    /* [드럼롤 중 텍스트 스타일] - 0~4초 동안 적용
       4가지 애니메이션이 동시에 실행됩니다:
       1. shake: 좌우 진동
       2. colorCycle: 무지개 색상 변화
       3. scaleUp: 크기 커졌다 작아짐
       4. shadowPulse: 그림자 효과 */
    .drumroll {
      font-size: 32px;
      font-weight: bold;
      animation:
        shake 0.3s ease-in-out infinite,
        colorCycle 1s linear infinite,
        scaleUp 0.4s ease-in-out infinite,
        shadowPulse 0.5s ease-in-out infinite;
    }

    /* [카운트다운 스타일] - 마지막 1초 (4~5초) 동안 적용
       붉은색 + 큰 글씨 + 강한 빛 효과로 긴장감 극대화 */
    .drumroll-countdown {
      font-size: 40px;
      font-weight: bold;
      animation:
        scaleUp 0.5s ease-in-out infinite,
        glowRed 0.5s ease-in-out infinite;
      color: #e74c3c; /* 빨간색 */
    }

    /* [화면 진동 효과] - 텍스트가 살짝 떨리는 효과
       좌우/상하로 3px씩 움직입니다
       ⚙️ 숫자를 바꾸면 진동 크기 조절 가능 */
    @keyframes shake {
      0%, 100% { transform: translateX(0) translateY(0); }
      25% { transform: translateX(-3px) translateY(2px); }
      50% { transform: translateX(3px) translateY(-2px); }
      75% { transform: translateX(-2px) translateY(1px); }
    }

    /* [색상 변화] - 무지개색으로 계속 바뀜
       빨강 → 청록 → 파랑 → 노랑 → 보라 → 빨강 (반복)
       ⚙️ 색상 코드를 바꾸면 다른 색으로 변경 가능 */
    @keyframes colorCycle {
      0% { color: #ff6b6b; }   /* 빨강 */
      20% { color: #4ecdc4; }  /* 청록 */
      40% { color: #45b7d1; }  /* 파랑 */
      60% { color: #ffd93d; }  /* 노랑 */
      80% { color: #a78bfa; }  /* 보라 */
      100% { color: #ff6b6b; } /* 빨강 (처음으로) */
    }

    /* [크기 변화] - 텍스트가 커졌다 작아졌다 반복
       원래 크기의 1.15배까지 커짐
       ⚙️ 1.15를 1.3으로 바꾸면 더 크게 커짐 */
    @keyframes scaleUp {
      0%, 100% { transform: scale(1); }    /* 원래 크기 */
      50% { transform: scale(1.15); }      /* 1.15배 확대 */
    }

    /* [그림자 펄스] - 그림자가 강해졌다 약해졌다 반복
       텍스트 주변에 빨간색 빛이 번짐
       ⚙️ 숫자를 바꾸면 빛의 강도 조절 가능 */
    @keyframes shadowPulse {
      0%, 100% {
        text-shadow: 0 0 10px rgba(255, 107, 107, 0.5);
      }
      50% {
        text-shadow: 0 0 25px rgba(255, 107, 107, 1),
                     0 0 35px rgba(255, 107, 107, 0.8);
      }
    }

    /* [카운트다운용 붉은 빛] - 마지막 1초에 사용
       강한 빨간색 빛 효과로 긴장감 최고조
       ⚙️ 숫자를 바꾸면 빛의 강도 조절 가능 */
    @keyframes glowRed {
      0%, 100% {
        text-shadow: 0 0 15px rgba(231, 76, 60, 0.8);
      }
      50% {
        text-shadow: 0 0 30px rgba(231, 76, 60, 1),
                     0 0 45px rgba(231, 76, 60, 0.9);
      }
    }

    /* 색종이 스타일 */
    .confetti {
      position: fixed;
      width: 10px;
      height: 10px;
      background-color: #f0f;
      opacity: 0.8;
      animation: confetti-fall 3s linear forwards;
      z-index: 1000;
    }

    @keyframes confetti-fall {
      to {
        transform: translateY(100vh) rotate(360deg);
        opacity: 0;
      }
    }

    /* 배경 그라디언트 효과 */
    .celebration-bg {
      animation: rainbow-bg 2s ease-in-out;
    }

    @keyframes rainbow-bg {
      0% { background-color: #f0f0f0; }
      25% { background-color: #fff5f5; }
      50% { background-color: #fffbf0; }
      75% { background-color: #f0fff5; }
      100% { background-color: #f0f0f0; }
    }

    /* 참가자 수 입력 화면 스타일 */
    #setupScreen {
      text-align: center;
      padding: 40px;
      background: white;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      max-width: 400px;
    }

    #participantCount {
      font-size: 20px;
      padding: 12px 20px;
      width: 150px;
      text-align: center;
      border: 2px solid #3498db;
      border-radius: 8px;
      margin: 10px;
      outline: none;
      transition: border-color 0.3s;
    }

    #participantCount:focus {
      border-color: #2980b9;
      box-shadow: 0 0 8px rgba(52, 152, 219, 0.3);
    }

    #setupScreen button {
      background-color: #3498db;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px 30px;
      font-size: 16px;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    #setupScreen button:hover {
      background-color: #2980b9;
    }

    #mainScreen {
      text-align: center;
    }
  </style>
</head>
<body>
  <!-- ===================================== -->
  <!-- 프로그램 제목 -->
  <!-- ===================================== -->
  <h1>랜덤 추첨기</h1>

  <!-- ===================================== -->
  <!-- [1단계 화면] 참가자 수 입력 화면 -->
  <!-- 처음에 보이는 화면입니다 -->
  <!-- ===================================== -->
  <div id="setupScreen">
    <!-- 안내 문구 -->
    <p style="font-size: 18px; margin-bottom: 15px;">참가자가 몇 명인가요?</p>

    <!-- 숫자 입력칸 (최소 1명, 최대 10명) -->
    <input type="number" id="participantCount" min="1" max="10" placeholder="숫자 입력" />

    <!-- 확인 버튼 (createInputs 함수 실행) -->
    <button onclick="createInputs()">확인</button>

    <!-- 안내 문구 (작은 글씨) -->
    <p style="font-size: 12px; color: #666; margin-top: 10px;">(최대 10명)</p>
  </div>

  <!-- ===================================== -->
  <!-- [2단계 화면] 추첨 화면 -->
  <!-- 처음에는 숨겨져 있다가, 확인 버튼을 누르면 나타납니다 -->
  <!-- ===================================== -->
  <div id="mainScreen" style="display: none;">
    <!-- 참가자 이름 입력 영역 (여기에 입력칸들이 자동으로 생성됨) -->
    <div class="input-container" id="inputContainer">
      <!-- 여기에 입력 필드들이 JavaScript로 동적으로 생성됩니다 -->
      <!-- 예: 5명 선택 → 5개의 입력칸이 생김 -->
    </div>

    <!-- 추첨하기 버튼 (drawWinner 함수 실행) -->
    <button onclick="drawWinner()">추첨하기</button>

    <!-- 엑셀로 내보내기 버튼 (exportToExcel 함수 실행) -->
    <button onclick="exportToExcel()">엑셀로 내보내기</button>

    <!-- 참가자 수 변경 버튼 (resetSetup 함수 실행, 회색 버튼) -->
    <button onclick="resetSetup()" style="background-color: #95a5a6; font-size: 14px; padding: 8px 15px;">참가자 수 변경</button>

    <!-- 결과 표시 영역 (드럼롤 + 당첨자 발표가 여기에 나타남) -->
    <div id="result"></div>
  </div>

  <script>
    // ========================================
    // 전역 변수 (프로그램 전체에서 사용하는 변수들)
    // ========================================

    // 추첨 결과를 저장하는 배열 (시간과 당첨자 이름이 저장됨)
    const results = [];

    // 프로그램 시작 시간 (엑셀 파일 이름에 사용됨)
    const startTime = new Date();

    // 추첨 중인지 확인하는 변수 (중복 클릭 방지용)
    // true = 추첨 중, false = 추첨 가능
    let isDrawing = false;

    // ========================================
    // [참가자 입력 필드 생성] 함수
    // 역할: 사용자가 입력한 숫자만큼 이름 입력칸을 만듭니다
    // 예: 5명 입력 → 5개의 입력칸이 생김
    // ========================================
    function createInputs() {
      // 1단계: 사용자가 입력한 참가자 수 가져오기
      const count = parseInt(document.getElementById('participantCount').value);

      // 2단계: 입력값이 올바른지 확인 (1~10명 사이여야 함)
      if (!count || count < 1 || count > 10) {
        alert("1명에서 10명 사이의 숫자를 입력해주세요.");
        return; // 잘못된 입력이면 여기서 멈춤
      }

      // 3단계: 입력칸을 담을 영역 찾기
      const container = document.getElementById('inputContainer');
      container.innerHTML = ''; // 기존에 있던 입력칸 모두 지우기

      // 4단계: 입력한 숫자만큼 입력칸 만들기 (반복문 사용)
      for (let i = 1; i <= count; i++) {
        const input = document.createElement('input'); // 새로운 입력칸 생성
        input.type = 'text'; // 텍스트 입력 타입
        input.placeholder = `참가자 ${i}`; // 입력칸에 보이는 안내 문구
        container.appendChild(input); // 화면에 입력칸 추가
      }

      // 5단계: 화면 전환 (참가자 수 입력 화면 → 추첨 화면)
      document.getElementById('setupScreen').style.display = 'none'; // 첫 화면 숨기기
      document.getElementById('mainScreen').style.display = 'block'; // 추첨 화면 보이기

      // 6단계: 첫 번째 입력칸에 자동으로 커서 이동 (편의 기능)
      if (container.querySelector('input')) {
        container.querySelector('input').focus();
      }
    }

    // ========================================
    // [참가자 수 변경] 함수
    // 역할: 처음 화면으로 돌아가서 참가자 수를 다시 설정할 수 있게 합니다
    // "참가자 수 변경" 버튼을 누르면 실행됩니다
    // ========================================
    function resetSetup() {
      // 1단계: 추첨 결과가 있는지 확인
      if (results.length > 0) {
        // 결과가 있으면 정말 초기화할 건지 확인 메시지 띄우기
        if (!confirm("추첨 결과가 초기화됩니다. 계속하시겠습니까?")) {
          return; // 사용자가 "취소"를 누르면 여기서 멈춤
        }
        results.length = 0; // 사용자가 "확인"을 누르면 결과 모두 지우기
      }

      // 2단계: 화면 전환 (추첨 화면 → 참가자 수 입력 화면)
      document.getElementById('mainScreen').style.display = 'none'; // 추첨 화면 숨기기
      document.getElementById('setupScreen').style.display = 'block'; // 첫 화면 보이기

      // 3단계: 모든 입력값 초기화
      document.getElementById('participantCount').value = ''; // 참가자 수 입력칸 비우기
      document.getElementById('result').textContent = ''; // 당첨자 텍스트 지우기
      document.getElementById('result').className = ''; // 당첨자 애니메이션 제거
    }

    // ========================================
    // [Enter 키 지원] 기능
    // 역할: 참가자 수 입력 후 Enter 키를 누르면 자동으로 확인 버튼이 눌립니다
    // ========================================
    document.addEventListener('DOMContentLoaded', function() {
      // 페이지가 완전히 로딩된 후 실행
      const participantInput = document.getElementById('participantCount');
      if (participantInput) {
        // 키보드 입력 감지
        participantInput.addEventListener('keypress', function(event) {
          if (event.key === 'Enter') {
            // Enter 키를 누르면 createInputs() 함수 실행 (확인 버튼과 동일)
            createInputs();
          }
        });
      }
    });

    // ========================================
    // [색종이 효과] 함수
    // 역할: 당첨자 발표 시 화면에 60개의 색종이를 떨어뜨립니다
    // ========================================
    function createConfetti() {
      // 색종이에 사용할 색상 6가지
      const colors = ['#ff6b6b', '#4ecdc4', '#45b7d1', '#ffd93d', '#6bcf7f', '#a78bfa'];
      const confettiCount = 60; // 생성할 색종이 개수 (이 숫자를 바꾸면 색종이 개수 변경 가능)

      // 색종이 60개를 하나씩 만들기 (반복문)
      for (let i = 0; i < confettiCount; i++) {
        // 1단계: 새로운 색종이 요소 만들기
        const confetti = document.createElement('div');
        confetti.className = 'confetti'; // CSS 스타일 적용

        // 2단계: 랜덤한 색상 선택
        const randomColor = colors[Math.floor(Math.random() * colors.length)];
        confetti.style.backgroundColor = randomColor;

        // 3단계: 랜덤한 시작 위치 설정 (화면 상단 어딘가에서 시작)
        confetti.style.left = Math.random() * 100 + '%'; // 가로 위치 0~100%
        confetti.style.top = -10 + 'px'; // 화면 위쪽에서 시작

        // 4단계: 랜덤한 크기 설정 (5~13px 사이)
        const size = Math.random() * 8 + 5;
        confetti.style.width = size + 'px';
        confetti.style.height = size + 'px';

        // 5단계: 떨어지는 시작 시간을 랜덤하게 (동시에 안 떨어지고 조금씩 차이나게)
        confetti.style.animationDelay = Math.random() * 0.5 + 's';

        // 6단계: 화면에 색종이 추가
        document.body.appendChild(confetti);

        // 7단계: 3초 후 자동으로 색종이 제거 (메모리 절약)
        setTimeout(() => {
          confetti.remove();
        }, 3000);
      }
    }

    // ========================================
    // [드럼롤 효과] 함수 ⭐ 핵심 기능! ⭐
    // 역할: 5초 동안 이름이 빠르게 바뀌다가 점점 느려지며 긴장감을 높입니다
    // 마지막 1초에는 카운트다운 (3, 2, 1)이 표시됩니다
    //
    // 타임라인:
    // 0-3초: 빠른 속도로 이름 변경 (진동 + 색상 변화)
    // 3-4초: 중간 속도로 이름 변경
    // 4-5초: 느린 속도 + 카운트다운 (3, 2, 1) + 붉은 빛
    // ========================================
    function startDrumRoll(names, finalWinner) {
      // 당첨자를 표시할 영역
      const resultDiv = document.getElementById('result');

      // 속도 관련 변수들 (이 숫자를 바꾸면 드럼롤 속도 조절 가능)
      let currentDelay = 50; // 시작 속도 (50ms = 0.05초, 작을수록 빠름)
      const delayIncrement = 20; // 매번 이만큼씩 느려짐 (20ms씩 증가)
      let elapsedTime = 0; // 경과 시간 추적
      const countdownStart = 4000; // 4초 후부터 카운트다운 시작 (4000ms = 4초)

      // 드럼롤 스타일 적용 (진동 + 색상 변화 + 크기 변화)
      resultDiv.className = 'drumroll';

      // 드럼롤 한 단계 실행하는 내부 함수
      function drumRollStep() {
        // 1단계: 참가자 이름 중 하나를 랜덤으로 선택
        const randomName = names[Math.floor(Math.random() * names.length)];

        // 2단계: 현재 시간에 따라 다른 표시 방식 사용
        if (elapsedTime >= countdownStart) {
          // 4초 이후: 카운트다운 모드 (3, 2, 1 표시)
          resultDiv.className = 'drumroll-countdown'; // 붉은 빛 스타일 적용
          const countdown = Math.ceil((5000 - elapsedTime) / 1000); // 남은 초 계산

          if (countdown > 0) {
            // 카운트다운 숫자와 함께 이름 표시
            resultDiv.textContent = `🎲 ${randomName} 🎲 ... ${countdown}`;
          } else {
            // 카운트다운 종료 → 최종 당첨자 발표
            showWinner(finalWinner);
            return; // 드럼롤 종료
          }
        } else {
          // 0-4초: 일반 드럼롤 (이름만 표시)
          resultDiv.textContent = `🎲 ${randomName} 🎲`;
        }

        // 3단계: 경과 시간 증가
        elapsedTime += currentDelay;

        // 4단계: 5초가 안 됐으면 계속 진행
        if (elapsedTime < 5000) {
          // 점진적으로 속도를 늦춤 (더 느리게 만들기)
          if (elapsedTime > 3000) {
            // 3초 이후: 2배 빠르게 느려짐 (긴장감 극대화)
            currentDelay += delayIncrement * 2;
          } else {
            // 0-3초: 천천히 느려짐
            currentDelay += delayIncrement;
          }

          // 다음 단계를 currentDelay 시간 후에 실행
          setTimeout(drumRollStep, currentDelay);
        } else {
          // 5초 경과 → 최종 당첨자 발표
          showWinner(finalWinner);
        }
      }

      // 드럼롤 시작!
      drumRollStep();
    }

    // ========================================
    // [당첨자 발표] 함수
    // 역할: 드럼롤이 끝난 후 최종 당첨자를 화려하게 발표합니다
    // - 텍스트가 크게 튀어나옴
    // - 금색으로 반짝임
    // - 색종이 60개가 떨어짐
    // - 배경색이 무지개색으로 변함
    // ========================================
    function showWinner(winner) {
      const resultDiv = document.getElementById('result');

      // 1단계: 드럼롤 스타일 제거
      resultDiv.className = '';

      // 2단계: 배경 무지개 효과 추가 (2초간 지속)
      document.body.classList.add('celebration-bg');

      // 3단계: 당첨자 이름 표시 + 애니메이션 적용
      resultDiv.textContent = `🎉 당첨자: ${winner} 🎉`;
      resultDiv.classList.add('winner-animation'); // 튀어나오기 + 반짝임 효과

      // 4단계: 색종이 효과 실행
      createConfetti();

      // 5단계: 2초 후 배경 효과 제거 (당첨자 애니메이션은 계속 유지)
      setTimeout(() => {
        document.body.classList.remove('celebration-bg');
      }, 2000);
    }

    // ========================================
    // [추첨하기] 함수 ⭐ 메인 함수! ⭐
    // 역할: "추첨하기" 버튼을 누르면 실행되는 핵심 함수입니다
    // 전체 프로세스:
    // 1. 입력값 확인
    // 2. 랜덤으로 당첨자 선택
    // 3. 드럼롤 효과 시작 (5초)
    // 4. 당첨자 발표
    // 5. 결과 저장
    // ========================================
    function drawWinner() {
      // 1단계: 이미 추첨 중이면 중복 실행 방지
      if (isDrawing) {
        return; // 추첨 중일 때 버튼을 다시 눌러도 무시됨
      }

      // 2단계: 모든 입력칸에서 참가자 이름 가져오기
      const inputs = Array.from(document.querySelectorAll('#inputContainer input'));
      // 빈 칸은 제외하고, 입력된 이름만 모으기 (trim으로 앞뒤 공백 제거)
      const names = inputs.map(input => input.value.trim()).filter(name => name !== "");

      // 3단계: 참가자가 한 명도 없으면 경고 메시지
      if (names.length === 0) {
        alert("최소 한 명 이상의 참가자를 입력해 주세요.");
        return; // 추첨 중단
      }

      // 4단계: 추첨 시작 표시 (중복 클릭 방지용)
      isDrawing = true;

      // 5단계: 이전 당첨자 애니메이션 제거 (깨끗한 화면으로 시작)
      const resultDiv = document.getElementById('result');
      resultDiv.classList.remove('winner-animation');

      // 6단계: 랜덤으로 당첨자 선택
      // Math.random()으로 0~1 사이 숫자 생성 → 참가자 수만큼 곱하기 → 정수로 변환
      const randomIndex = Math.floor(Math.random() * names.length);
      const winner = names[randomIndex]; // 당첨자 결정!

      // 7단계: 드럼롤 효과 시작 (5초 동안 이름이 바뀌다가 당첨자 발표)
      startDrumRoll(names, winner);

      // 8단계: 결과를 배열에 저장 (엑셀 내보내기용)
      // 현재 시간과 당첨자 이름을 함께 저장
      results.push({ timestamp: new Date().toLocaleString(), winner });

      // 9단계: 5.5초 후 다시 추첨 가능하게 설정
      // (드럼롤 5초 + 당첨자 발표 애니메이션 시간 고려)
      setTimeout(() => {
        isDrawing = false; // 이제 다시 추첨 버튼을 누를 수 있음
      }, 5500);
    }

    // ========================================
    // [엑셀로 내보내기] 함수
    // 역할: 모든 추첨 결과를 CSV 파일로 다운로드합니다
    // CSV 파일은 엑셀이나 구글 시트에서 열 수 있습니다
    // 파일명 형식: draw_results_20260124_153045.csv (년월일_시분초)
    // ========================================
    function exportToExcel() {
      // 1단계: CSV 파일 내용 만들기
      // 첫 줄에 컬럼명 추가 (시간, 당첨자)
      let csvContent = "data:text/csv;charset=utf-8,시간,당첨자\n";

      // 2단계: 모든 추첨 결과를 한 줄씩 추가
      results.forEach(row => {
        csvContent += `${row.timestamp},${row.winner}\n`;
      });

      // 3단계: 파일 이름 만들기 (프로그램 시작 시간 사용)
      // 숫자를 2자리로 만드는 함수 (예: 5 → 05)
      const pad = (n) => n.toString().padStart(2, '0');

      // 년, 월, 일, 시, 분, 초 추출
      const yyyy = startTime.getFullYear(); // 년 (예: 2026)
      const MM = pad(startTime.getMonth() + 1); // 월 (0부터 시작하므로 +1)
      const dd = pad(startTime.getDate()); // 일
      const hh = pad(startTime.getHours()); // 시
      const mm = pad(startTime.getMinutes()); // 분
      const ss = pad(startTime.getSeconds()); // 초

      // 파일명 조합: draw_results_20260124_153045.csv
      const filename = `draw_results_${yyyy}${MM}${dd}_${hh}${mm}${ss}.csv`;

      // 4단계: 다운로드 링크 만들기
      const encodedUri = encodeURI(csvContent); // 특수문자 인코딩
      const link = document.createElement("a"); // 가짜 링크 생성
      link.setAttribute("href", encodedUri); // CSV 데이터 연결
      link.setAttribute("download", filename); // 다운로드 파일명 설정

      // 5단계: 자동으로 클릭해서 다운로드 실행
      document.body.appendChild(link); // 링크를 페이지에 추가
      link.click(); // 자동 클릭
      document.body.removeChild(link); // 다운로드 후 링크 제거
    }
  </script>
</body>
