<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>추첨 프로그램</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      background-color: #f0f0f0;
      padding: 30px 20px;
      box-sizing: border-box;
    }
    h1 {
      margin-bottom: 10px;
    }
    .input-container {
      display: grid;
      grid-template-columns: repeat(3, auto);
      gap: 5px 15px;
      margin-bottom: 20px;
    }
    .input-container input {
      padding: 5px;
      font-size: 14px;
      width: 180px;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      margin: 5px;
    }
    #result {
      margin-top: 30px;
      font-size: 24px;
      font-weight: bold;
      color: #2c3e50;
      min-height: 40px;
    }

    /* 당첨자 텍스트 튀어나오기 애니메이션 */
    @keyframes winnerAppear {
      0% {
        transform: scale(0) rotate(-10deg);
        opacity: 0;
      }
      50% {
        transform: scale(1.3) rotate(5deg);
      }
      100% {
        transform: scale(1) rotate(0deg);
        opacity: 1;
      }
    }

    /* 반짝이는 효과 */
    @keyframes glow {
      0%, 100% {
        text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 15px #ffd700, 0 0 20px #ffd700;
      }
      50% {
        text-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 30px #ffd700, 0 0 40px #ffd700;
      }
    }

    /* 당첨자 발표 시 적용될 클래스 */
    .winner-animation {
      animation: winnerAppear 0.6s ease-out, glow 1.5s ease-in-out infinite;
      font-size: 36px !important;
      color: #ff6b6b;
    }

    /* 드럼롤 중 텍스트 스타일 (강화된 버전) */
    .drumroll {
      font-size: 32px;
      font-weight: bold;
      animation:
        shake 0.3s ease-in-out infinite,
        colorCycle 1s linear infinite,
        scaleUp 0.4s ease-in-out infinite,
        shadowPulse 0.5s ease-in-out infinite;
    }

    /* 카운트다운 스타일 */
    .drumroll-countdown {
      font-size: 40px;
      font-weight: bold;
      animation:
        scaleUp 0.5s ease-in-out infinite,
        glowRed 0.5s ease-in-out infinite;
      color: #e74c3c;
    }

    /* 화면 진동 효과 */
    @keyframes shake {
      0%, 100% { transform: translateX(0) translateY(0); }
      25% { transform: translateX(-3px) translateY(2px); }
      50% { transform: translateX(3px) translateY(-2px); }
      75% { transform: translateX(-2px) translateY(1px); }
    }

    /* 색상 변화 (무지개 효과) */
    @keyframes colorCycle {
      0% { color: #ff6b6b; }
      20% { color: #4ecdc4; }
      40% { color: #45b7d1; }
      60% { color: #ffd93d; }
      80% { color: #a78bfa; }
      100% { color: #ff6b6b; }
    }

    /* 크기 변화 */
    @keyframes scaleUp {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }

    /* 그림자 펄스 */
    @keyframes shadowPulse {
      0%, 100% {
        text-shadow: 0 0 10px rgba(255, 107, 107, 0.5);
      }
      50% {
        text-shadow: 0 0 25px rgba(255, 107, 107, 1),
                     0 0 35px rgba(255, 107, 107, 0.8);
      }
    }

    /* 카운트다운용 붉은 빛 */
    @keyframes glowRed {
      0%, 100% {
        text-shadow: 0 0 15px rgba(231, 76, 60, 0.8);
      }
      50% {
        text-shadow: 0 0 30px rgba(231, 76, 60, 1),
                     0 0 45px rgba(231, 76, 60, 0.9);
      }
    }

    /* 색종이 스타일 */
    .confetti {
      position: fixed;
      width: 10px;
      height: 10px;
      background-color: #f0f;
      opacity: 0.8;
      animation: confetti-fall 3s linear forwards;
      z-index: 1000;
    }

    @keyframes confetti-fall {
      to {
        transform: translateY(100vh) rotate(360deg);
        opacity: 0;
      }
    }

    /* 배경 그라디언트 효과 */
    .celebration-bg {
      animation: rainbow-bg 2s ease-in-out;
    }

    @keyframes rainbow-bg {
      0% { background-color: #f0f0f0; }
      25% { background-color: #fff5f5; }
      50% { background-color: #fffbf0; }
      75% { background-color: #f0fff5; }
      100% { background-color: #f0f0f0; }
    }

    /* 참가자 수 입력 화면 스타일 */
    #setupScreen {
      text-align: center;
      padding: 40px;
      background: white;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      max-width: 480px;
      width: 100%;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: #aaa;
      font-size: 13px;
    }
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #ddd;
    }

    /* 파일 업로드 영역 */
    .upload-area {
      border: 2px dashed #3498db;
      border-radius: 10px;
      padding: 20px;
      background: #f8faff;
      cursor: pointer;
      transition: background 0.2s;
    }
    .upload-area:hover {
      background: #eef4ff;
    }
    .upload-area input[type="file"] {
      display: none;
    }
    .upload-area label {
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .upload-icon {
      font-size: 32px;
    }
    .upload-label-text {
      font-size: 15px;
      color: #3498db;
      font-weight: bold;
    }
    .upload-hint {
      font-size: 12px;
      color: #888;
      line-height: 1.6;
      margin-top: 4px;
    }
    .format-guide {
      background: #fffbea;
      border: 1px solid #f0c040;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      color: #7a6000;
      text-align: left;
      margin-top: 10px;
      line-height: 1.7;
    }
    .format-guide strong {
      display: block;
      margin-bottom: 2px;
      color: #5a4500;
    }

    #participantCount {
      font-size: 20px;
      padding: 12px 20px;
      width: 150px;
      text-align: center;
      border: 2px solid #3498db;
      border-radius: 8px;
      margin: 10px;
      outline: none;
      transition: border-color 0.3s;
    }

    #participantCount:focus {
      border-color: #2980b9;
      box-shadow: 0 0 8px rgba(52, 152, 219, 0.3);
    }

    #setupScreen button {
      background-color: #3498db;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px 30px;
      font-size: 16px;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    #setupScreen button:hover {
      background-color: #2980b9;
    }

    #mainScreen {
      text-align: center;
      width: 100%;
      max-width: 700px;
    }

    .main-scroll-area {
      max-height: 60vh;
      overflow-y: auto;
      padding: 10px 5px;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <h1>랜덤 추첨기</h1>

  <!-- 1단계: 참가자 수 입력 화면 -->
  <div id="setupScreen">

    <!-- 수동 입력 -->
    <p style="font-size: 18px; margin-bottom: 15px;">참가자가 몇 명인가요?</p>
    <input type="number" id="participantCount" min="1" max="2000" placeholder="숫자 입력" />
    <button onclick="createInputs()">확인</button>
    <p style="font-size: 12px; color: #666; margin-top: 5px;">(최대 2000명)</p>

    <div class="divider">또는</div>

    <!-- 파일 업로드 -->
    <div class="upload-area">
      <label for="xlsxFileInput">
        <span class="upload-icon">📂</span>
        <span class="upload-label-text">xlsx 파일로 일괄 입력</span>
        <span class="upload-hint">파일을 클릭하여 선택하세요</span>
      </label>
      <input type="file" id="xlsxFileInput" accept=".xlsx" onchange="handleXlsxUpload(event)" />
    </div>

    <div class="format-guide">
      <strong>📋 파일 형식 안내</strong>
      xlsx 파일의 첫 번째 시트에서 <code><b>name</b></code> 이라는 헤더 컬럼을 읽습니다.<br>
      예시: A1 셀 = <code>name</code>, A2부터 참가자 이름 입력<br>
      최대 2000명까지 자동으로 입력됩니다.
    </div>

  </div>

  <!-- 2단계: 추첨 화면 (처음에는 숨겨짐) -->
  <div id="mainScreen" style="display: none;">
    <div class="main-scroll-area">
      <div class="input-container" id="inputContainer">
        <!-- 여기에 입력 필드들이 동적으로 생성됩니다 -->
      </div>
    </div>

    <button onclick="drawWinner()">추첨하기</button>
    <button onclick="exportToExcel()">엑셀로 내보내기</button>
    <button onclick="resetSetup()" style="background-color: #95a5a6; font-size: 14px; padding: 8px 15px;">참가자 수 변경</button>
    <div id="result"></div>
  </div>

  <script>
    const results = [];
    const startTime = new Date();
    let isDrawing = false;

    // 참가자 입력 필드 동적 생성 함수
    function createInputs(prefill) {
      const count = prefill
        ? prefill.length
        : parseInt(document.getElementById('participantCount').value);

      if (!prefill && (!count || count < 1 || count > 60)) {
        alert("1명에서 60명 사이의 숫자를 입력해주세요.");
        return;
      }

      const container = document.getElementById('inputContainer');
      container.innerHTML = '';

      for (let i = 1; i <= count; i++) {
        const input = document.createElement('input');
        input.type = 'text';
        input.placeholder = `참가자 ${i}`;
        if (prefill && prefill[i - 1] !== undefined) {
          input.value = prefill[i - 1];
        }
        container.appendChild(input);
      }

      document.getElementById('setupScreen').style.display = 'none';
      document.getElementById('mainScreen').style.display = 'block';

      if (container.querySelector('input')) {
        container.querySelector('input').focus();
      }
    }

    // xlsx 파일 업로드 처리
    function handleXlsxUpload(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const data = new Uint8Array(e.target.result);
          const workbook = XLSX.read(data, { type: 'array' });

          const sheetName = workbook.SheetNames[0];
          const worksheet = workbook.Sheets[sheetName];
          const jsonData = XLSX.utils.sheet_to_json(worksheet, { defval: '' });

          // 'name' 컬럼 추출
          if (jsonData.length === 0 || !Object.keys(jsonData[0]).includes('name')) {
            alert("파일에 'name' 컬럼이 없습니다.\n\n첫 번째 행에 'name' 헤더가 있는 xlsx 파일을 사용해 주세요.");
            event.target.value = '';
            return;
          }

          const names = jsonData
            .map(row => String(row['name']).trim())
            .filter(name => name !== '' && name !== 'undefined');

          if (names.length === 0) {
            alert("'name' 컬럼에 유효한 참가자 이름이 없습니다.");
            event.target.value = '';
            return;
          }

          if (names.length > 60) {
            alert(`참가자가 ${names.length}명입니다. 최대 60명까지만 지원하므로 앞에서 60명만 불러옵니다.`);
            names.splice(60);
          }

          createInputs(names);
        } catch (err) {
          alert("파일을 읽는 중 오류가 발생했습니다. 올바른 xlsx 파일인지 확인해 주세요.");
          event.target.value = '';
        }
      };
      reader.readAsArrayBuffer(file);
    }

    // 참가자 수 변경 (처음으로 돌아가기)
    function resetSetup() {
      if (results.length > 0) {
        if (!confirm("추첨 결과가 초기화됩니다. 계속하시겠습니까?")) {
          return;
        }
        results.length = 0;
      }

      document.getElementById('mainScreen').style.display = 'none';
      document.getElementById('setupScreen').style.display = 'block';

      document.getElementById('participantCount').value = '';
      document.getElementById('xlsxFileInput').value = '';
      document.getElementById('result').textContent = '';
      document.getElementById('result').className = '';
    }

    // Enter 키로 확인 버튼 실행
    document.addEventListener('DOMContentLoaded', function() {
      const participantInput = document.getElementById('participantCount');
      if (participantInput) {
        participantInput.addEventListener('keypress', function(event) {
          if (event.key === 'Enter') {
            createInputs();
          }
        });
      }
    });

    // 색종이 효과 생성 함수
    function createConfetti() {
      const colors = ['#ff6b6b', '#4ecdc4', '#45b7d1', '#ffd93d', '#6bcf7f', '#a78bfa'];
      const confettiCount = 60;

      for (let i = 0; i < confettiCount; i++) {
        const confetti = document.createElement('div');
        confetti.className = 'confetti';

        confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        confetti.style.left = Math.random() * 100 + '%';
        confetti.style.top = -10 + 'px';

        const size = Math.random() * 8 + 5;
        confetti.style.width = size + 'px';
        confetti.style.height = size + 'px';

        confetti.style.animationDelay = Math.random() * 0.5 + 's';

        document.body.appendChild(confetti);

        setTimeout(() => {
          confetti.remove();
        }, 3000);
      }
    }

    // 드럼롤 효과 함수 (강화 버전 - 5초, 점진적 속도 감소)
    function startDrumRoll(names, finalWinner) {
      const resultDiv = document.getElementById('result');
      let currentDelay = 50;
      const delayIncrement = 20;
      let elapsedTime = 0;
      const countdownStart = 4000;

      resultDiv.className = 'drumroll';

      function drumRollStep() {
        const randomName = names[Math.floor(Math.random() * names.length)];

        if (elapsedTime >= countdownStart) {
          resultDiv.className = 'drumroll-countdown';
          const countdown = Math.ceil((5000 - elapsedTime) / 1000);
          if (countdown > 0) {
            resultDiv.textContent = `🎲 ${randomName} 🎲 ... ${countdown}`;
          } else {
            showWinner(finalWinner);
            return;
          }
        } else {
          resultDiv.textContent = `🎲 ${randomName} 🎲`;
        }

        elapsedTime += currentDelay;

        if (elapsedTime < 5000) {
          if (elapsedTime > 3000) {
            currentDelay += delayIncrement * 2;
          } else {
            currentDelay += delayIncrement;
          }
          setTimeout(drumRollStep, currentDelay);
        } else {
          showWinner(finalWinner);
        }
      }

      drumRollStep();
    }

    // 최종 당첨자 발표 함수
    function showWinner(winner) {
      const resultDiv = document.getElementById('result');

      resultDiv.className = '';

      document.body.classList.add('celebration-bg');

      resultDiv.textContent = `🎉 당첨자: ${winner} 🎉`;
      resultDiv.classList.add('winner-animation');

      createConfetti();

      setTimeout(() => {
        document.body.classList.remove('celebration-bg');
      }, 2000);
    }

    function drawWinner() {
      if (isDrawing) return;

      const inputs = Array.from(document.querySelectorAll('#inputContainer input'));
      const names = inputs.map(input => input.value.trim()).filter(name => name !== "");

      if (names.length === 0) {
        alert("최소 한 명 이상의 참가자를 입력해 주세요.");
        return;
      }

      isDrawing = true;

      const resultDiv = document.getElementById('result');
      resultDiv.classList.remove('winner-animation');

      const randomIndex = Math.floor(Math.random() * names.length);
      const winner = names[randomIndex];

      startDrumRoll(names, winner);

      results.push({ timestamp: new Date().toLocaleString(), winner });

      setTimeout(() => {
        isDrawing = false;
      }, 5500);
    }

    function exportToExcel() {
      let csvContent = "data:text/csv;charset=utf-8,시간,당첨자\n";
      results.forEach(row => {
        csvContent += `${row.timestamp},${row.winner}\n`;
      });

      const pad = (n) => n.toString().padStart(2, '0');
      const yyyy = startTime.getFullYear();
      const MM = pad(startTime.getMonth() + 1);
      const dd = pad(startTime.getDate());
      const hh = pad(startTime.getHours());
      const mm = pad(startTime.getMinutes());
      const ss = pad(startTime.getSeconds());
      const filename = `draw_results_${yyyy}${MM}${dd}_${hh}${mm}${ss}.csv`;

      const encodedUri = encodeURI(csvContent);
      const link = document.createElement("a");
      link.setAttribute("href", encodedUri);
      link.setAttribute("download", filename);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }
  </script>
</body>
</html>
