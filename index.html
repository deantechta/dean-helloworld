<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>추첨 프로그램</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background-color: #f0f0f0;
    }
    h1 {
      margin-bottom: 10px;
    }
    .input-container {
      display: grid;
      grid-template-columns: repeat(2, auto);
      gap: 5px 15px;
      margin-bottom: 20px;
    }
    .input-container input {
      padding: 5px;
      font-size: 14px;
      width: 200px;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      margin: 5px;
    }
    #result {
      margin-top: 30px;
      font-size: 24px;
      font-weight: bold;
      color: #2c3e50;
      min-height: 40px;
    }

    /* 당첨자 텍스트 튀어나오기 애니메이션 */
    @keyframes winnerAppear {
      0% {
        transform: scale(0) rotate(-10deg);
        opacity: 0;
      }
      50% {
        transform: scale(1.3) rotate(5deg);
      }
      100% {
        transform: scale(1) rotate(0deg);
        opacity: 1;
      }
    }

    /* 반짝이는 효과 */
    @keyframes glow {
      0%, 100% {
        text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 15px #ffd700, 0 0 20px #ffd700;
      }
      50% {
        text-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 30px #ffd700, 0 0 40px #ffd700;
      }
    }

    /* 당첨자 발표 시 적용될 클래스 */
    .winner-animation {
      animation: winnerAppear 0.6s ease-out, glow 1.5s ease-in-out infinite;
      font-size: 36px !important;
      color: #ff6b6b;
    }

    /* 드럼롤 중 텍스트 스타일 (강화된 버전) */
    .drumroll {
      font-size: 32px;
      font-weight: bold;
      animation:
        shake 0.3s ease-in-out infinite,
        colorCycle 1s linear infinite,
        scaleUp 0.4s ease-in-out infinite,
        shadowPulse 0.5s ease-in-out infinite;
    }

    /* 카운트다운 스타일 */
    .drumroll-countdown {
      font-size: 40px;
      font-weight: bold;
      animation:
        scaleUp 0.5s ease-in-out infinite,
        glowRed 0.5s ease-in-out infinite;
      color: #e74c3c;
    }

    /* 화면 진동 효과 */
    @keyframes shake {
      0%, 100% { transform: translateX(0) translateY(0); }
      25% { transform: translateX(-3px) translateY(2px); }
      50% { transform: translateX(3px) translateY(-2px); }
      75% { transform: translateX(-2px) translateY(1px); }
    }

    /* 색상 변화 (무지개 효과) */
    @keyframes colorCycle {
      0% { color: #ff6b6b; }
      20% { color: #4ecdc4; }
      40% { color: #45b7d1; }
      60% { color: #ffd93d; }
      80% { color: #a78bfa; }
      100% { color: #ff6b6b; }
    }

    /* 크기 변화 */
    @keyframes scaleUp {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }

    /* 그림자 펄스 */
    @keyframes shadowPulse {
      0%, 100% {
        text-shadow: 0 0 10px rgba(255, 107, 107, 0.5);
      }
      50% {
        text-shadow: 0 0 25px rgba(255, 107, 107, 1),
                     0 0 35px rgba(255, 107, 107, 0.8);
      }
    }

    /* 카운트다운용 붉은 빛 */
    @keyframes glowRed {
      0%, 100% {
        text-shadow: 0 0 15px rgba(231, 76, 60, 0.8);
      }
      50% {
        text-shadow: 0 0 30px rgba(231, 76, 60, 1),
                     0 0 45px rgba(231, 76, 60, 0.9);
      }
    }

    /* 색종이 스타일 */
    .confetti {
      position: fixed;
      width: 10px;
      height: 10px;
      background-color: #f0f;
      opacity: 0.8;
      animation: confetti-fall 3s linear forwards;
      z-index: 1000;
    }

    @keyframes confetti-fall {
      to {
        transform: translateY(100vh) rotate(360deg);
        opacity: 0;
      }
    }

    /* 배경 그라디언트 효과 */
    .celebration-bg {
      animation: rainbow-bg 2s ease-in-out;
    }

    @keyframes rainbow-bg {
      0% { background-color: #f0f0f0; }
      25% { background-color: #fff5f5; }
      50% { background-color: #fffbf0; }
      75% { background-color: #f0fff5; }
      100% { background-color: #f0f0f0; }
    }

    /* 참가자 수 입력 화면 스타일 */
    #setupScreen {
      text-align: center;
      padding: 40px;
      background: white;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      max-width: 400px;
    }

    #participantCount {
      font-size: 20px;
      padding: 12px 20px;
      width: 150px;
      text-align: center;
      border: 2px solid #3498db;
      border-radius: 8px;
      margin: 10px;
      outline: none;
      transition: border-color 0.3s;
    }

    #participantCount:focus {
      border-color: #2980b9;
      box-shadow: 0 0 8px rgba(52, 152, 219, 0.3);
    }

    #setupScreen button {
      background-color: #3498db;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px 30px;
      font-size: 16px;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    #setupScreen button:hover {
      background-color: #2980b9;
    }

    #mainScreen {
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>랜덤 추첨기</h1>

  <!-- 1단계: 참가자 수 입력 화면 -->
  <div id="setupScreen">
    <p style="font-size: 18px; margin-bottom: 15px;">참가자가 몇 명인가요?</p>
    <input type="number" id="participantCount" min="1" max="10" placeholder="숫자 입력" />
    <button onclick="createInputs()">확인</button>
    <p style="font-size: 12px; color: #666; margin-top: 10px;">(최대 10명)</p>
  </div>

  <!-- 2단계: 추첨 화면 (처음에는 숨겨짐) -->
  <div id="mainScreen" style="display: none;">
    <div class="input-container" id="inputContainer">
      <!-- 여기에 입력 필드들이 동적으로 생성됩니다 -->
    </div>

    <button onclick="drawWinner()">추첨하기</button>
    <button onclick="exportToExcel()">엑셀로 내보내기</button>
    <button onclick="resetSetup()" style="background-color: #95a5a6; font-size: 14px; padding: 8px 15px;">참가자 수 변경</button>
    <div id="result"></div>
  </div>

  <script>
    const results = [];
    const startTime = new Date();
    let isDrawing = false; // 추첨 중 중복 클릭 방지

    // 참가자 입력 필드 동적 생성 함수
    function createInputs() {
      const count = parseInt(document.getElementById('participantCount').value);

      // 유효성 검사
      if (!count || count < 1 || count > 10) {
        alert("1명에서 10명 사이의 숫자를 입력해주세요.");
        return;
      }

      // 입력 필드 생성
      const container = document.getElementById('inputContainer');
      container.innerHTML = ''; // 기존 내용 지우기

      for (let i = 1; i <= count; i++) {
        const input = document.createElement('input');
        input.type = 'text';
        input.placeholder = `참가자 ${i}`;
        container.appendChild(input);
      }

      // 화면 전환
      document.getElementById('setupScreen').style.display = 'none';
      document.getElementById('mainScreen').style.display = 'block';

      // 첫 번째 입력 필드에 포커스
      if (container.querySelector('input')) {
        container.querySelector('input').focus();
      }
    }

    // 참가자 수 변경 (처음으로 돌아가기)
    function resetSetup() {
      // 결과 초기화 여부 확인
      if (results.length > 0) {
        if (!confirm("추첨 결과가 초기화됩니다. 계속하시겠습니까?")) {
          return;
        }
        results.length = 0; // 결과 배열 초기화
      }

      // 화면 전환
      document.getElementById('mainScreen').style.display = 'none';
      document.getElementById('setupScreen').style.display = 'block';

      // 입력 값 초기화
      document.getElementById('participantCount').value = '';
      document.getElementById('result').textContent = '';
      document.getElementById('result').className = '';
    }

    // Enter 키로 확인 버튼 실행
    document.addEventListener('DOMContentLoaded', function() {
      const participantInput = document.getElementById('participantCount');
      if (participantInput) {
        participantInput.addEventListener('keypress', function(event) {
          if (event.key === 'Enter') {
            createInputs();
          }
        });
      }
    });

    // 색종이 효과 생성 함수
    function createConfetti() {
      const colors = ['#ff6b6b', '#4ecdc4', '#45b7d1', '#ffd93d', '#6bcf7f', '#a78bfa'];
      const confettiCount = 60; // 색종이 개수

      for (let i = 0; i < confettiCount; i++) {
        const confetti = document.createElement('div');
        confetti.className = 'confetti';

        // 랜덤 색상
        confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];

        // 랜덤 시작 위치 (화면 상단)
        confetti.style.left = Math.random() * 100 + '%';
        confetti.style.top = -10 + 'px';

        // 랜덤 크기
        const size = Math.random() * 8 + 5;
        confetti.style.width = size + 'px';
        confetti.style.height = size + 'px';

        // 랜덤 애니메이션 지연
        confetti.style.animationDelay = Math.random() * 0.5 + 's';

        document.body.appendChild(confetti);

        // 3초 후 제거
        setTimeout(() => {
          confetti.remove();
        }, 3000);
      }
    }

    // 드럼롤 효과 함수 (강화 버전 - 5초, 점진적 속도 감소)
    function startDrumRoll(names, finalWinner) {
      const resultDiv = document.getElementById('result');
      let currentDelay = 50; // 시작 속도 (50ms)
      const delayIncrement = 20; // 매번 20ms씩 느려짐
      let elapsedTime = 0;
      const countdownStart = 4000; // 4초 후 카운트다운 시작

      resultDiv.className = 'drumroll';

      function drumRollStep() {
        // 랜덤하게 이름 표시
        const randomName = names[Math.floor(Math.random() * names.length)];

        // 카운트다운 단계 (4초 이후)
        if (elapsedTime >= countdownStart) {
          resultDiv.className = 'drumroll-countdown';
          const countdown = Math.ceil((5000 - elapsedTime) / 1000);
          if (countdown > 0) {
            resultDiv.textContent = `🎲 ${randomName} 🎲 ... ${countdown}`;
          } else {
            // 드럼롤 종료, 당첨자 발표
            showWinner(finalWinner);
            return;
          }
        } else {
          // 일반 드럼롤
          resultDiv.textContent = `🎲 ${randomName} 🎲`;
        }

        // 시간 증가
        elapsedTime += currentDelay;

        // 5초 미만이면 계속 진행
        if (elapsedTime < 5000) {
          // 점진적으로 속도 감소 (3초 이후부터 더 빠르게 느려짐)
          if (elapsedTime > 3000) {
            currentDelay += delayIncrement * 2; // 더 빠르게 느려짐
          } else {
            currentDelay += delayIncrement;
          }

          setTimeout(drumRollStep, currentDelay);
        } else {
          // 5초 후 최종 당첨자 발표
          showWinner(finalWinner);
        }
      }

      // 드럼롤 시작
      drumRollStep();
    }

    // 최종 당첨자 발표 함수
    function showWinner(winner) {
      const resultDiv = document.getElementById('result');

      // 드럼롤 클래스 제거
      resultDiv.className = '';

      // 배경 그라디언트 효과 추가
      document.body.classList.add('celebration-bg');

      // 당첨자 텍스트 표시
      resultDiv.textContent = `🎉 당첨자: ${winner} 🎉`;
      resultDiv.classList.add('winner-animation');

      // 색종이 효과
      createConfetti();

      // 5초 후 애니메이션 클래스 제거 (반짝임은 유지하고 싶다면 제거하지 않아도 됨)
      setTimeout(() => {
        document.body.classList.remove('celebration-bg');
      }, 2000);
    }

    function drawWinner() {
      // 이미 추첨 중이면 리턴
      if (isDrawing) {
        return;
      }

      const inputs = Array.from(document.querySelectorAll('#inputContainer input'));
      const names = inputs.map(input => input.value.trim()).filter(name => name !== "");

      if (names.length === 0) {
        alert("최소 한 명 이상의 참가자를 입력해 주세요.");
        return;
      }

      // 추첨 시작
      isDrawing = true;

      // 이전 애니메이션 클래스 제거
      const resultDiv = document.getElementById('result');
      resultDiv.classList.remove('winner-animation');

      // 최종 당첨자 결정
      const randomIndex = Math.floor(Math.random() * names.length);
      const winner = names[randomIndex];

      // 드럼롤 효과 시작 (5초 후 당첨자 발표)
      startDrumRoll(names, winner);

      // 결과 저장
      results.push({ timestamp: new Date().toLocaleString(), winner });

      // 5.5초 후 추첨 가능 상태로 변경 (드럼롤 5초 + 여유 0.5초)
      setTimeout(() => {
        isDrawing = false;
      }, 5500);
    }

    function exportToExcel() {
      let csvContent = "data:text/csv;charset=utf-8,시간,당첨자\n";
      results.forEach(row => {
        csvContent += `${row.timestamp},${row.winner}\n`;
      });

      const pad = (n) => n.toString().padStart(2, '0');
      const yyyy = startTime.getFullYear();
      const MM = pad(startTime.getMonth() + 1);
      const dd = pad(startTime.getDate());
      const hh = pad(startTime.getHours());
      const mm = pad(startTime.getMinutes());
      const ss = pad(startTime.getSeconds());
      const filename = `draw_results_${yyyy}${MM}${dd}_${hh}${mm}${ss}.csv`;

      const encodedUri = encodeURI(csvContent);
      const link = document.createElement("a");
      link.setAttribute("href", encodedUri);
      link.setAttribute("download", filename);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }
  </script>
</body>
</html>
